<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Datos - Doble Boleta</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📑</text></svg>">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: 600;
            color: var(--secondary);
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: var(--text);
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
        }

        .results {
            background-color: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 24px;
            width: 100%;
            box-sizing: border-box;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: var(--secondary);
            font-weight: 600;
        }

        .match {
            color: var(--success);
            font-weight: bold;
        }

        .mismatch {
            color: var(--danger);
            font-weight: bold;
            background-color: #fef2f2;
        }

        .field-name {
            font-weight: 600;
            width: 200px;
        }

        @media (max-width: 768px) {
            .inputs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" style="position: absolute; top: 1.5rem; left: 1.5rem; text-decoration: none; color: #94a3b8; font-size: 13px; display: flex; align-items: center; gap: 4px; transition: color 0.2s;" onmouseover="this.style.color='#64748b'" onmouseout="this.style.color='#94a3b8'">
        <span>←</span> Volver al inicio
    </a>

    <div class="container">
        <header>
            <h1>Comparador de Datos</h1>
            <p>Pega los datos de las dos fuentes para comparar automáticamente.</p>
        </header>

        <div class="inputs-grid">
            <div class="input-group">
                <label for="input1">Entrada 1 (Formato Vertical/Etiquetas)</label>
                <textarea id="input1" placeholder="Pega aquí los datos con etiquetas (Nombre: ..., Apellido: ...)"></textarea>
            </div>
            <div class="input-group">
                <label for="input2">Entrada 2 (Formato Horizontal/Tabulado)</label>
                <textarea id="input2" placeholder="Pega aquí los datos en una sola línea tabulada"></textarea>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="compararDatos()">Comparar</button>
            <button class="btn-secondary" onclick="limpiar()">Limpiar</button>
        </div>

        <div id="results" class="results">
            <h2>Resultados de la Comparación</h2>
            <table>
                <thead>
                    <tr>
                        <th>Campo</th>
                        <th>Entrada 1</th>
                        <th>Entrada 2</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <!-- Se llenará con JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function parseInput1(text) {
            const data = {};
            const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.endsWith(':')) {
                    const key = line.replace(':', '').toLowerCase();
                    const value = lines[i + 1] ? lines[i + 1].trim() : '';
                    data[key] = value;
                    i++; // Saltamos el valor ya procesado
                } else if (line.includes(':')) {
                    const parts = line.split(':');
                    const key = parts[0].trim().toLowerCase();
                    const value = parts.slice(1).join(':').trim();
                    data[key] = value;
                }
            }
            return data;
        }

        function parseInput2(text) {
            const parts = text.split(/\t| {2,}/).map(p => p.trim()).filter(p => p !== '');
            // Basado en el nuevo formato proporcionado:
            // 0: Tipo de documento
            // 1: Numero de documento
            // 2: Sexo
            // 3: Email
            // 4: Numero de tarjeta
            // 5: Nombre
            // 6: Telefono
            // 7: Institucion
            
            return {
                tipo_doc: parts[0] || '',
                dni: parts[1] || '',
                sexo: parts[2] || '',
                email: parts[3] || '',
                sube: parts[4] || '',
                nombre_completo: parts[5] || '',
                telefono: parts[6] || '',
                institucion: parts[7] || ''
            };
        }

        function normalize(str) {
            if (!str) return '';
            return str.toString().trim().toUpperCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // Quitar acentos
        }

        function compararDatos() {
            const text1 = document.getElementById('input1').value;
            const text2 = document.getElementById('input2').value;

            if (!text1 || !text2) {
                alert('Por favor completa ambas entradas');
                return;
            }

            const data1 = parseInput1(text1);
            const data2 = parseInput2(text2);

            const resultsBody = document.getElementById('results-body');
            resultsBody.innerHTML = '';

            const fields = [
                { 
                    label: 'Tipo de Documento', 
                    val1: data1['tipo de documento'] || '', 
                    val2: data2.tipo_doc,
                    customMatch: (v1, v2) => {
                        const n1 = normalize(v1);
                        const n2 = normalize(v2);
                        if (n1 === n2) return true;
                        // Equivalencia específica: DNI Nacional = 1
                        if (n1 === 'DNI NACIONAL' && n2 === '1') return true;
                        if (n1 === '1' && n2 === 'DNI NACIONAL') return true;
                        return false;
                    }
                },
                { 
                    label: 'DNI / Número', 
                    val1: data1['número'] || data1['numero'] || '', 
                    val2: data2.dni 
                },
                { 
                    label: 'Sexo', 
                    val1: data1['sexo'] || '', 
                    val2: data2.sexo,
                    customMatch: (v1, v2) => {
                        const n1 = normalize(v1);
                        const n2 = normalize(v2);
                        if (n1 === n2) return true;
                        // Equivalencias de Sexo
                        const male = ['MASCULINO', 'M', 'HOMBRE'];
                        const female = ['FEMENINO', 'F', 'MUJER'];
                        if (male.includes(n1) && male.includes(n2)) return true;
                        if (female.includes(n1) && female.includes(n2)) return true;
                        return false;
                    }
                },
                { 
                    label: 'Nombre Completo', 
                    val1: `${data1['apellido'] || ''} ${data1['nombre'] || ''}`.trim(), 
                    val2: data2.nombre_completo 
                },
                { 
                    label: 'Email', 
                    val1: data1['email'] || '', 
                    val2: data2.email 
                },
                { 
                    label: 'Tarjeta SUBE', 
                    val1: data1['número de tarjeta sube'] || data1['sube'] || '', 
                    val2: data2.sube 
                },
                { 
                    label: 'Teléfono', 
                    val1: data1['teléfono'] || data1['telefono'] || data1['teléfono de contacto'] || '', 
                    val2: data2.telefono 
                }
            ];

            fields.forEach(field => {
                const val1 = field.val1 || '';
                const val2 = field.val2 || '';
                
                let isMatch = false;
                if (field.customMatch) {
                    isMatch = field.customMatch(val1, val2);
                } else {
                    const norm1 = normalize(val1);
                    const norm2 = normalize(val2);
                    isMatch = norm1 === norm2 || (norm1 && norm2 && (norm1.includes(norm2) || norm2.includes(norm1)));
                }

                const row = document.createElement('tr');
                row.className = isMatch ? '' : 'mismatch';
                
                row.innerHTML = `
                    <td class="field-name">${field.label}</td>
                    <td>${val1 || '<em style="color:#94a3b8">Vacío</em>'}</td>
                    <td>${val2 || '<em style="color:#94a3b8">Vacío</em>'}</td>
                    <td class="${isMatch ? 'match' : 'mismatch'}">
                        ${isMatch ? '✓ Coincide' : '✗ Diferente'}
                    </td>
                `;
                resultsBody.appendChild(row);
            });

            document.getElementById('results').style.display = 'block';
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        function limpiar() {
            document.getElementById('input1').value = '';
            document.getElementById('input2').value = '';
            document.getElementById('results').style.display = 'none';
        }
    </script>
</body>
</html>
